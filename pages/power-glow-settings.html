<!DOCTYPE html>
<html class="settings-page" tabindex="0"
data-settings-key="power-glow-settings-v1" lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="Content-Security-Policy" content="script-src-elem 'self' 'unsafe-inline';" />
		<title>Power Glow Settings</title>
		<script src="/pages/src/preloads.js"></script>

		<script type="module">
			import {settingsMain} from './src/power-glow-settings.mjs';
			settingsMain();
		</script>

	<link rel="stylesheet" href="./css/common.css" />
	<style type="text/css">
		body {
			--min-bg-opacity: 0;
			--bg-opacity: 1;
			--outline-opacity: 0.4;
			--final-bg-opacity: max(var(--min-bg-opacity) * 100%, var(--bg-opacity) * 100%);
			color: hsl(var(--theme-fg-hue) var(--theme-fg-sat) var(--theme-fg-light)/100%);
			background-image: linear-gradient(135deg, hsl(var(--theme-bg-hue) var(--theme-bg-sat) var(--theme-bg-light)/var(--final-bg-opacity)), hsl(var(--theme-bg2-hue) var(--theme-bg2-sat) var(--theme-bg2-light)/var(--final-bg-opacity)));
		}
	</style>
	</head>
	<body>
		<div id="titlebar">
            <header>
                <div class="title">Power Glow - Settings</div>
                <div class="filler"></div>
                <div class="buttons">
                    <div title="Close this window" class="button close electron-only"><ms>close</ms></div>
                </div>
            </header>
        </div>
        <div id="settings">
            <form class="section">
				<fieldset>
					<legend>Zones (W)</legend>
                <label>
                    <key>Zone 1:</key>
                    <input type="number" min="0" step="1" name="zone1"/>
                </label>
				<label>
                    <key>Zone 2:</key>
                    <input type="number" min="0" step="1" name="zone2"/>
                </label>
				<label>
					<key>Zone 3:</key>
					<input type="number" min="0" step="1" name="zone3"/>
				</label>
				<label>
					<key>Zone 4:</key>
					<input type="number" min="0" step="1" name="zone4"/>
				</label>
				<label>
					<key>Zone 5:</key>
					<input type="number" min="0" step="1" name="zone5"/>
				</label>
				<label>
					<key>Zone 6:</key>
					<input type="number" min="0" step="1" name="zone6"/>
				</label>
				<label>
					<key>Zone 7:</key>
					<input type="number" min="0" step="1" name="zone7"/>
				</label>
				</fieldset>
				<fieldset>
					<legend>Colours (#rrggbb)</legend>
					<label>
						<key>Colour 1:</key>
						<input type="color" name="color1"/>
					</label>
					<label>
						<key>Colour 2:</key>
						<input type="color" name="color2"/>
					</label>
					<label>
						<key>Colour 3:</key>
						<input type="color" name="color3"/>
					</label>
					<label>
						<key>Colour 4:</key>
						<input type="color" name="color4"/>
					</label>
					<label>
						<key>Colour 5:</key>
						<input type="color" name="color5"/>
					</label>
					<label>
						<key>Colour 6:</key>
						<input type="color" name="color6"/>
					</label>
					<label>
						<key>Colour 7:</key>
						<input type="color" name="color7"/>
					</label>
					<label>
						<key>Colour 8 (MAX):</key>
						<input type="color" name="color8"/>
				</fieldset>
            </form>
        </div>
	</body>
</html>
